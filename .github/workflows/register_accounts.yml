name: Register Hotmail Accounts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies and non-Snap Firefox
      run: |
        sudo apt-get update
        # Install prerequisites for add-apt-repository and xvfb
        sudo apt-get install -y software-properties-common xvfb
        # Add Mozilla PPA and install the .deb version of Firefox
        sudo add-apt-repository ppa:mozillateam/ppa -y
        sudo apt-get update
        sudo apt-get install -y firefox

    - name: Install Python dependencies
      run: pip install ruyiPage faker requests

    - name: Run registration script with virtual display
      # Use xvfb-run to provide a virtual display, which can help with stability
      # even in headless mode. The --auto-servernum and --server-args are standard practices.
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
        python hotmail_register.py --count 5 --headless --delay 30

    - name: Upload registration results
      uses: actions/upload-artifact@v4
      with:
        name: registration-results
        path: |
          accounts.txt
          hotmail_register.log
          *.png
        if-no-files-found: ignore
